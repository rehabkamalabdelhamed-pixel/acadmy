<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم المشرف</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
  <div class="row g-0 min-vh-100">
    <!-- الشريط الجانبي -->
    <div class="col-md-3 sidebar">
      <div class="mb-4">
        <h2 class="mb-4"><i class="bi bi-shield-lock"></i> لوحة المشرف</h2>
        <div id="adminInfo" class="text-muted small"></div>
      </div>
      <nav class="nav flex-column">
        <a class="nav-link text-white active" href="#" data-tab="dashboard">
          <i class="bi bi-bar-chart me-2"></i> الإحصائيات
        </a>
        <a class="nav-link text-white" href="#" data-tab="teachers">
          <i class="bi bi-people me-2"></i> المدرسون
        </a>
        <a class="nav-link text-white" href="#" data-tab="students">
          <i class="bi bi-person-check me-2"></i> الطلاب
        </a>
        <a class="nav-link text-white" href="#" data-tab="videos">
          <i class="bi bi-film me-2"></i> الفيديوهات
        </a>
        <hr class="border-secondary">
        <a class="nav-link text-white" href="#" onclick="logout()">
          <i class="bi bi-box-arrow-left me-2"></i> تسجيل الخروج
        </a>
      </nav>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="col-md-9 main-content">
      <!-- الإحصائيات -->
      <div id="dashboardTab" class="tab-content">
        <h2 class="mb-4">لوحة التحكم</h2>
        <div class="row">
          <div class="col-md-3 mb-3">
            <div class="stat-box d-flex align-items-center gap-3">
              <div><i class="bi bi-people-fill stat-icon"></i></div>
              <div>
                <div class="stat-number" id="usersCount">0</div>
                <div class="stat-label">إجمالي المستخدمين</div>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-box d-flex align-items-center gap-3">
              <div><i class="bi bi-person-badge stat-icon"></i></div>
              <div>
                <div class="stat-number" id="teachersCount">0</div>
                <div class="stat-label">المدرسون</div>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-box d-flex align-items-center gap-3">
              <div><i class="bi bi-person-check stat-icon"></i></div>
              <div>
                <div class="stat-number" id="studentsCount">0</div>
                <div class="stat-label">الطلاب</div>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-box d-flex align-items-center gap-3">
              <div><i class="bi bi-play-btn stat-icon"></i></div>
              <div>
                <div class="stat-number" id="videosCount">0</div>
                <div class="stat-label">الفيديوهات</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- المدرسون -->
      <div id="teachersTab" class="tab-content d-none">
        <h2 class="mb-4">إدارة المدرسون</h2>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>البريد الإلكتروني</th>
                <th>الدور</th>
              </tr>
            </thead>
            <tbody id="teachersList"></tbody>
          </table>
        </div>
      </div>

      <!-- الطلاب -->
      <div id="studentsTab" class="tab-content d-none">
        <h2 class="mb-4">إدارة الطلاب</h2>
        <div class="input-group mb-3">
          <input type="text" id="searchStudents" class="form-control" placeholder="ابحث عن طالب...">
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>البريد الإلكتروني</th>
                <th>تاريخ التسجيل</th>
              </tr>
            </thead>
            <tbody id="studentsList"></tbody>
          </table>
        </div>
      </div>

      <!-- الفيديوهات -->
      <div id="videosTab" class="tab-content d-none">
        <h2 class="mb-4">إدارة الفيديوهات</h2>
        <div class="mb-3 subject-filters">
          <div class="btn-group" role="group" aria-label="subjects">
            <button class="btn btn-sm pill-prog" data-subject="" onclick="filterBySubject('')"><i class="bi bi-code-slash icon-sm"></i> جميع المواد</button>
            <button class="btn btn-sm pill-prog" data-subject="برمجة وذكاء اصطناعي" onclick="filterBySubject('برمجة وذكاء اصطناعي')"><i class="bi bi-laptop icon-sm"></i> برمجة وذكاء اصطناعي</button>
            <button class="btn btn-sm pill-js" data-subject="جافا اسكربت" onclick="filterBySubject('جافا اسكربت')"><i class="bi bi-file-code icon-sm"></i> جافا اسكربت</button>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="text" id="searchVideos" class="form-control" placeholder="ابحث عن فيديو...">
          <input type="hidden" id="filterCategory" value="">
        </div>
        <div class="table-responsive">
          <table class="table table-hover">
            <thead class="table-light">
              <tr>
                <th>العنوان</th>
                <th>المدرس</th>
                <th>التصنيف</th>
                <th>تاريخ الإضافة</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="videosList"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function getCatBadge(cat){
      const key = cat || '';
      if(key === 'برمجة وذكاء اصطناعي') return `<span class="badge-category pill-prog subject-label"><i class="bi bi-laptop icon-sm"></i> ${cat}</span>`;
      if(key === 'جافا اسكربت') return `<span class="badge-category pill-js subject-label"><i class="bi bi-file-code icon-sm"></i> ${cat}</span>`;
      return `<span class="badge-category bg-light text-muted">${cat}</span>`;
    }

    function filterBySubject(subject){
      document.getElementById('filterCategory').value = subject;
      document.getElementById('searchVideos').value = '';
      filterVideos();
    }
  </script>
  <script>
    const API_URL = 'http://localhost:3000';
    let adminEmail = localStorage.getItem('userEmail') || 'admin12345@gmail.com';
    let allUsers = [];
    let allVideos = [];

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('adminInfo').textContent = adminEmail;
      loadStats();
      loadAllUsers();
      loadAllVideos();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.dataset.tab) {
            e.preventDefault();
            switchTab(link.dataset.tab);
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
          }
        });
      });

      document.getElementById('searchStudents').addEventListener('input', filterStudents);
      document.getElementById('searchVideos').addEventListener('input', filterVideos);
      document.getElementById('filterCategory').addEventListener('change', filterVideos);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
      document.getElementById(tab + 'Tab').classList.remove('d-none');
    }

    async function loadStats() {
      try {
        const res = await fetch(`${API_URL}/admin/stats?email=${adminEmail}`);
        const stats = await res.json();
        document.getElementById('usersCount').textContent = stats.totalUsers || 0;
        document.getElementById('teachersCount').textContent = stats.totalTeachers || 0;
        document.getElementById('studentsCount').textContent = stats.totalStudents || 0;
        document.getElementById('videosCount').textContent = stats.totalVideos || 0;
      } catch (err) {
        console.error('خطأ في تحميل الإحصائيات:', err);
      }
    }

    async function loadAllUsers() {
      try {
        const res = await fetch(`${API_URL}/admin/users?admin=${adminEmail}`);
        allUsers = await res.json();
        renderTeachers();
        renderStudents();
      } catch (err) {
        console.error('خطأ في تحميل المستخدمين:', err);
      }
    }

    function renderTeachers() {
      const teachers = allUsers.filter(u => u.role === 'teacher');
      const list = document.getElementById('teachersList');
      list.innerHTML = '';
      
      if (teachers.length === 0) {
        list.innerHTML = '<tr><td colspan="2" class="text-muted">لا توجد مدرسون</td></tr>';
        return;
      }

      teachers.forEach(teacher => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${teacher.email}</td>
          <td><span class="badge bg-primary">مدرس</span></td>
        `;
        list.appendChild(row);
      });
    }

    function renderStudents() {
      const students = allUsers.filter(u => u.role === 'student');
      const list = document.getElementById('studentsList');
      list.innerHTML = '';
      
      if (students.length === 0) {
        list.innerHTML = '<tr><td colspan="2" class="text-muted">لا توجد طلاب حتى الآن</td></tr>';
        return;
      }

      students.forEach(student => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${student.email}</td>
          <td><small class="text-muted">جديد</small></td>
        `;
        list.appendChild(row);
      });
    }

    function filterStudents() {
      const search = document.getElementById('searchStudents').value.toLowerCase();
      document.querySelectorAll('#studentsList tr').forEach(row => {
        const email = row.textContent.toLowerCase();
        row.style.display = email.includes(search) ? '' : 'none';
      });
    }

    async function loadAllVideos() {
      try {
        const res = await fetch(`${API_URL}/videos`);
        allVideos = await res.json();
        renderVideos(allVideos);
      } catch (err) {
        console.error('خطأ في تحميل الفيديوهات:', err);
      }
    }

    function renderVideos(videos) {
      const list = document.getElementById('videosList');
      list.innerHTML = '';
      
      if (videos.length === 0) {
        list.innerHTML = '<tr><td colspan="5" class="text-muted">لا توجد فيديوهات</td></tr>';
        return;
      }

      videos.forEach(video => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td><strong>${video.title}</strong></td>
          <td>${video.teacher}</td>
          <td>${getCatBadge(video.category)}</td>
          <td>${new Date(video.createdAt).toLocaleDateString('ar-EG')}</td>
          <td>
            <button class="btn btn-sm btn-danger" onclick="deleteVideo('${video.id}')">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        `;
        list.appendChild(row);
      });
    }

    function filterVideos() {
      const search = document.getElementById('searchVideos').value.toLowerCase();
      const category = document.getElementById('filterCategory').value;
      
      const filtered = allVideos.filter(v => {
        const titleMatch = v.title.toLowerCase().includes(search);
        const categoryMatch = category === '' || v.category === category;
        return titleMatch && categoryMatch;
      });
      
      renderVideos(filtered);
    }

    async function deleteVideo(videoId) {
      if (!confirm('هل تريد حذف هذا الفيديو؟')) return;

      try {
        const res = await fetch(`${API_URL}/videos/${videoId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teacher: adminEmail })
        });

        if (res.ok) {
          alert('تم حذف الفيديو بنجاح');
          loadAllVideos();
          loadStats();
        } else {
          const error = await res.json();
          alert('خطأ: ' + error.message);
        }
      } catch (err) {
        alert('خطأ في الاتصال بالخادم');
      }
    }

    function logout() {
      if (confirm('هل تريد تسجيل الخروج؟')) {
        localStorage.removeItem('userEmail');
        window.location.href = '../login/login.html';
      }
    }
  </script>
</body>
</html>
