<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="row g-0 min-vh-100">
    <!-- الشريط الجانبي -->
    <div class="col-lg-2 sidebar">
      <div class="mb-4">
        <h2 class="mb-4"><i class="bi bi-mortarboard"></i> لوحة الطالب</h2>
        <div id="studentInfo" class="text-muted small"></div>
      </div>
      <nav class="nav flex-column">
        <a class="nav-link text-white active" href="#" data-tab="dashboard">
          <i class="bi bi-house-door-fill me-2"></i> لوحة التحكم
        </a>
        <a class="nav-link text-white" href="#" data-tab="videos">
          <i class="bi bi-play-circle-fill me-2"></i> الفيديوهات
        </a>
        <a class="nav-link text-white" href="#" data-tab="teachers">
          <i class="bi bi-people-fill me-2"></i> المدرسين
        </a>
        <a class="nav-link text-white" href="#" data-tab="exams">
          <i class="bi bi-file-earmark-check me-2"></i> الامتحانات
        </a>
        <a class="nav-link text-white" href="#" data-tab="pdfs">
          <i class="bi bi-file-earmark-pdf me-2"></i> ملفات PDF
        </a>
        <hr class="border-secondary">
        <a class="nav-link text-white" href="#" onclick="logout()">
          <i class="bi bi-box-arrow-left me-2"></i> تسجيل الخروج
        </a>
      </nav>
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="col-lg-10 main-content">
      <!-- لوحة التحكم -->
      <div id="dashboardTab" class="tab-content">
        <h2 class="mb-4">مرحباً بك في لوحة التحكم</h2>
        <div class="row">
          <div class="col-md-3 mb-3">
            <div class="stat-card d-flex align-items-center gap-3">
              <div><i class="bi bi-play-btn-fill stat-icon"></i></div>
              <div>
                <div class="stat-number" id="videosWatched">0</div>
                <small class="text-muted">فيديوهات شاهدتها</small>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-card d-flex align-items-center gap-3">
              <div><i class="bi bi-check-circle-fill stat-icon" style="color: var(--success-500);"></i></div>
              <div>
                <div class="stat-number" id="completedVideos">0</div>
                <small class="text-muted">فيديوهات مكتملة</small>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-card d-flex align-items-center gap-3">
              <div><i class="bi bi-graph-up-arrow stat-icon" style="color: var(--warning-500);"></i></div>
              <div>
                <div class="stat-number" id="totalProgress">0%</div>
                <small class="text-muted">نسبة التقدم</small>
              </div>
            </div>
          </div>
          <div class="col-md-3 mb-3">
            <div class="stat-card d-flex align-items-center gap-3">
              <i class="bi bi-list-check stat-icon"></i>
              <div>
                <div style="display:flex;gap:12px;align-items:center">
                  <div>
                    <div class="stat-number" id="examsTaken">0</div>
                    <small class="text-muted">تم حلها</small>
                  </div>
                  <div>
                    <div class="stat-number" id="examsPassed">0</div>
                    <small class="text-muted">ناجحة</small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- الفيديوهات -->
      <div id="videosTab" class="tab-content d-none">
        <h2 class="mb-4">الفيديوهات</h2>
        <div id="backButtonContainer" class="mb-3" style="display: none;">
          <button class="btn btn-secondary" onclick="showAllVideos()">
            <i class="bi bi-arrow-left me-2"></i> العودة إلى جميع الفيديوهات
          </button>
          <button class="btn btn-outline-primary ms-2" onclick="switchTab('teachers')">
            <i class="bi bi-people me-2"></i> العودة إلى المدرسين
          </button>
        </div>
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" id="searchVideos" class="form-control" placeholder="ابحث عن فيديو...">
          </div>
          <div class="col-md-6">
            <div class="subject-filters text-start">
              <button class="btn btn-sm pill-prog" onclick="filterBySubject('')"><i class="bi bi-laptop icon-sm"></i> كل المواد</button>
              <button class="btn btn-sm pill-prog" onclick="filterBySubject('برمجة وذكاء اصطناعي')"><i class="bi bi-laptop icon-sm"></i> برمجة وذكاء اصطناعي</button>
              <button class="btn btn-sm pill-js" onclick="filterBySubject('جافا اسكربت')"><i class="bi bi-file-code icon-sm"></i> جافا اسكربت</button>
            </div>
          </div>
        </div>
        <div class="row" id="videosList"></div>
      </div>

      <!-- المدرسين -->
      <div id="teachersTab" class="tab-content d-none">
        <h2 class="mb-4">المدرسين</h2>
        <div class="row" id="teachersList"></div>
      </div>

      <!-- الامتحانات -->
      <div id="examsTab" class="tab-content d-none">
        <h2 class="mb-4">الامتحانات</h2>
        <div id="examsList" class="row"></div>
      </div>

      <!-- ملفات PDF -->
      <div id="pdfsTab" class="tab-content d-none">
        <h2 class="mb-4">ملفات PDF</h2>
        <div id="pdfsList"></div>
      </div>
    </div>
  </div>

  <!-- Modal لعرض الفيديو -->
  <div class="modal fade" id="videoModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="videoTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="videoPlayer" style="width: 100%; height: 400px; background: #333; border-radius: 10px;"></div>
          <p id="videoDescription" class="mt-3"></p>
          <div class="mt-3">
            <label class="form-label">نسبة التقدم:</label>
            <div class="progress">
              <div id="progressBar" class="progress-bar progress-bar-animated" style="width: 0%"></div>
            </div>
            <input type="range" id="progressSlider" class="form-range mt-2" min="0" max="100" value="0">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
          <button type="button" class="btn btn-primary" id="markCompleteBtn">تم المشاهدة</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    let studentEmail = localStorage.getItem('userEmail') || 'student1@example.com';
    let allVideos = [];
    let studentProgress = {};
    let allTeachers = [];
    let currentVideoId = null;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('studentInfo').textContent = studentEmail;
      loadStudentProgress();
      loadAllVideos();
      loadTeachers();
      // load exams and pdfs lists for students (if provided by backend)
      if (typeof loadExams === 'function') loadExams();
      if (typeof loadStudentGrades === 'function') loadStudentGrades();
      if (typeof loadPdfs === 'function') loadPdfs();
      setupEventListeners();
    });

    function setupEventListeners() {
      // التنقل بين الأقسام
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.dataset.tab) {
            e.preventDefault();
            switchTab(link.dataset.tab);
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
            // إعادة تحميل البيانات عند فتح التابّ
            if (link.dataset.tab === 'exams') {
              refreshExamsDisplay(); // تحديث الامتحانات والدرجات معاً
            }
          }
        });
      });

      document.getElementById('searchVideos').addEventListener('input', filterVideos);
      document.getElementById('progressSlider').addEventListener('input', (e) => {
        document.getElementById('progressBar').style.width = e.target.value + '%';
      });
      document.getElementById('markCompleteBtn').addEventListener('click', markVideoComplete);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
      document.getElementById(tab + 'Tab').classList.remove('d-none');
    }

    async function loadStudentProgress() {
      try {
        const res = await fetch(`${API_URL}/progress/${studentEmail}`);
        const progress = await res.json();
        progress.forEach(p => {
          studentProgress[p.videoId] = p;
        });
        updateStats();
      } catch (err) {
        console.error('خطأ في تحميل التقدم:', err);
      }
    }

    async function loadAllVideos() {
      try {
        const res = await fetch(`${API_URL}/videos`);
        allVideos = await res.json();
        renderVideos(allVideos);
      } catch (err) {
        console.error('خطأ في تحميل الفيديوهات:', err);
      }
    }

    // ---------------------- Exams & PDFs for students ----------------------
    async function loadExams() {
      const list = document.getElementById('examsList');
      list.innerHTML = '<div class="alert alert-info">جاري تحميل الامتحانات...</div>';
      try {
        const [resEx, resGrades] = await Promise.all([fetch(`${API_URL}/exams`), fetch(`${API_URL}/grades?student=${encodeURIComponent(studentEmail)}`)]);
        if (!resEx.ok) throw new Error('no-exams');
        const exams = await resEx.json();
        const myGrades = resGrades.ok ? await resGrades.json() : [];
        const gradesByExam = {};
        myGrades.forEach(g => { gradesByExam[g.examId] = g; });

        if (!exams || exams.length === 0) {
          list.innerHTML = '<div class="alert alert-secondary">لا توجد امتحانات متاحة حالياً</div>';
          return;
        }
        list.innerHTML = '';
        exams.forEach(ex => {
          const col = document.createElement('div');
          col.className = 'col-md-4 mb-3';
          const grade = gradesByExam[ex.id];
          const gradeBadge = grade ? `
            <div style="margin-top: 10px; padding: 10px; background: ${(grade.score / (grade.maxScore || 10)) * 100 >= 50 ? '#d4edda' : '#f8d7da'}; border-radius: 6px; border-right: 4px solid ${(grade.score / (grade.maxScore || 10)) * 100 >= 50 ? '#28a745' : '#dc3545'};">
              <small style="color: ${(grade.score / (grade.maxScore || 10)) * 100 >= 50 ? '#155724' : '#721c24'};">
                <strong>نتيجتك:</strong> ${grade.score}${grade.maxScore ? ' / ' + grade.maxScore : ''} 
                <span style="margin-right: 8px;">(${Math.round((grade.score / (grade.maxScore || 10)) * 100)}%)</span>
              </small>
            </div>
          ` : '';
          col.innerHTML = `
            <div class="card p-3" style="border: 1px solid #ddd; border-radius: 10px; transition: transform 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.08);">
              <h6 style="font-weight: 600; margin-bottom: 8px;">${ex.title}</h6>
              <p class="small text-muted mb-2">${ex.description || ''}</p>
              <div class="d-flex gap-2 align-items-center">
                <button class="btn btn-primary btn-sm" onclick="openExamLink('${ex.id}')" style="flex: 1;">ابدأ الامتحان</button>
                <small class="text-muted ms-auto">${ex.date || '-'}</small>
              </div>
              ${gradeBadge}
            </div>`;
          list.appendChild(col);
        });
      } catch (err) {
        list.innerHTML = '<div class="alert alert-secondary">لا توجد امتحانات متاحة (يمكن توفيرها من الخادم)</div>';
      }
    }

    async function openExamLink(examId) {
      try {
        const res = await fetch(`${API_URL}/exams/${examId}`);
        if (!res.ok) return Swal.fire('خطأ','الامتحان غير موجود','error');
        const ex = await res.json();
        if (ex.link) {
          window.open(ex.link, '_blank');
        } else {
          Swal.fire('معلومة','هذا الامتحان ليس له رابط خارجي','info');
        }
      } catch (err) {
        Swal.fire('خطأ','خطأ في الاتصال بالخادم','error');
      }
    }
    
    // دالة محسّنة لجلب الدرجات الحديثة وتحديثها في الصفحة
    async function refreshExamsDisplay() {
      await Promise.all([loadExams(), loadStudentGrades()]);
    }

    async function loadPdfs() {
      const list = document.getElementById('pdfsList');
      list.innerHTML = '<div class="alert alert-info">جاري تحميل ملفات PDF...</div>';
      try {
        const res = await fetch(`${API_URL}/pdfs`);
        if (!res.ok) throw new Error('no-pdfs');
        const pdfs = await res.json();
        if (!pdfs || pdfs.length === 0) {
          list.innerHTML = '<div class="alert alert-secondary">لا توجد ملفات PDF متاحة حالياً</div>';
          return;
        }
        list.innerHTML = '';
        pdfs.forEach(p => {
          const el = document.createElement('div');
          el.className = 'mb-2';
          el.innerHTML = `<a href="#" class="d-flex justify-content-between align-items-center pdf-link" data-url="${p.url}">
            <span><i class="bi bi-file-earmark-pdf me-2 text-danger"></i>${p.title || p.name}</span>
            <button class="btn btn-sm btn-outline-primary">عرض</button>
          </a>`;
          el.querySelector('.pdf-link').addEventListener('click', (e) => {
            e.preventDefault();
            const url = e.currentTarget.dataset.url;
            document.getElementById('pdfViewerFrame').src = url;
            new bootstrap.Modal(document.getElementById('pdfViewerModal')).show();
          });
          list.appendChild(el);
        });
      } catch (err) {
        list.innerHTML = '<div class="alert alert-secondary">لا توجد ملفات PDF متاحة (يمكن توفيرها من الخادم)</div>';
      }
    }

    function startExam(id) {
      Swal.fire({
        title: 'ابدأ الامتحان؟',
        text: 'ستبدأ الامتحان الآن',
        showCancelButton: true,
        confirmButtonText: 'ابدأ',
        cancelButtonText: 'إلغاء'
      }).then(res => {
        if (res.isConfirmed) {
          // توجه لصفحة الامتحان أو افتح مودال (حسب تطبيقك)
          window.location.href = `../exams/exam.html?id=${encodeURIComponent(id)}`;
        }
      });
    }

    async function loadTeachers() {
      try {
        // جلب المدرسين
        const res = await fetch(`${API_URL}/teachers`);
        allTeachers = await res.json();
        renderTeachers();
      } catch (err) {
        console.error('خطأ في تحميل المدرسين:', err);
      }
    }

    function renderTeachers() {
      const mainContainer = document.getElementById('teachersList');
      mainContainer.innerHTML = '';

      if (allTeachers.length === 0) {
        mainContainer.innerHTML = '<div class="alert alert-info w-100 text-center"><i class="bi bi-info-circle me-2"></i>لا توجد مدرسون حالياً</div>';
        return;
      }

      allTeachers.forEach(teacher => {
        // عد الفيديوهات لهذا المدرس
        const teacherVideos = allVideos.filter(v => v.teacher === teacher.email);

        const card = document.createElement('div');
        card.className = 'col-md-4 mb-4';
        card.innerHTML = `
          <div class="video-card teacher-card">
            <div class="video-thumbnail">
              <i class="bi bi-person-circle" style="font-size: 3.5rem; color: white;"></i>
            </div>
            <div class="p-3">
              <h6 class="mb-2"><i class="bi bi-person-badge me-2"></i>${teacher.email}</h6>
              <p class="small text-muted mb-2"><i class="bi bi-briefcase me-1"></i>مدرس متخصص</p>
              <div class="mb-3">
                <span class="badge badge-category pill-prog subject-label">
                  <i class="bi bi-film me-1"></i> ${teacherVideos.length} فيديو
                </span>
              </div>
              <button class="btn btn-primary btn-sm w-100" onclick="filterByTeacher('${teacher.email}')">
                <i class="bi bi-eye-fill me-1"></i> عرض الفيديوهات
              </button>
            </div>
          </div>
        `;
        mainContainer.appendChild(card);
      });
    }

    function renderVideos(videos) {
      const container = document.getElementById('videosList');
      container.innerHTML = '';

      if (videos.length === 0) {
        container.innerHTML = '<div class="alert alert-info w-100">لا توجد فيديوهات متاحة حالياً</div>';
        return;
      }

      videos.forEach(video => {
        const progress = studentProgress[video.id] || { percent: 0, status: 'not-started' };
        const card = document.createElement('div');
        card.className = 'col-md-4 mb-4';
        card.innerHTML = `
          <div class="video-card" data-video-id="${video.id}" onclick="openVideoModal('${video.id}')">
            <div class="video-thumbnail">
              <i class="bi bi-play-circle" style="font-size: 3rem;"></i>
            </div>
            <div class="p-3">
              <h6 class="mb-2">${video.title}</h6>
              <p class="small text-muted mb-2">${video.description || 'بدون وصف'}</p>
              <div class="mb-2">
                ${getCatBadge(video.category)}
                <small class="text-muted ms-2">${video.teacher}</small>
              </div>
                <div class="progress" style="height: 5px;">
                <div class="progress-bar" style="width: ${progress.percent}%"></div>
              </div>
              <small class="text-muted d-block mt-2">${progress.percent}% مكتمل</small>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function getCatBadge(cat){
      if(!cat) return '';
      if(cat === 'برمجة وذكاء اصطناعي') return `<span class="badge-category pill-prog subject-label"><i class="bi bi-laptop icon-sm"></i> ${cat}</span>`;
      if(cat === 'جافا اسكربت') return `<span class="badge-category pill-js subject-label"><i class="bi bi-file-code icon-sm"></i> ${cat}</span>`;
      return `<span class="badge-category bg-light text-muted">${cat}</span>`;
    }

    function getYouTubeEmbedUrl(url) {
      if (!url) return '';
      
      // Extract video ID from various YouTube URL formats
      // try common patterns first
      const regex = /(?:v=|v\/|youtu\.be\/|embed\/|shorts\/)([A-Za-z0-9_-]{6,20})/i;
      let match = url.match(regex);
      let videoId = '';
      if (match && match[1]) {
        videoId = match[1].split('?')[0].split('&')[0];
      }

      // fallback: try parsing query param v
      if (!videoId) {
        try {
          const u = new URL(url);
          videoId = u.searchParams.get('v') || '';
        } catch (e) {
          // ignore invalid URL
        }
      }

      if (!videoId) {
        console.warn('لم يتمكن من استخراج معرف الفيديو من الرابط:', url);
        return null; // signal we couldn't build embed URL
      }

      videoId = videoId.trim();
      // ensure typical 11-char id if possible, but allow other lengths
      return `https://www.youtube.com/embed/${videoId}?rel=0&modestbranding=1`;
    }

    function filterBySubject(subject){
      document.getElementById('searchVideos').value = '';
      if(!subject){ 
        renderVideos(allVideos); 
        document.getElementById('backButtonContainer').style.display = 'none';
        return; 
      }
      const filtered = allVideos.filter(v => v.category === subject);
      renderVideos(filtered);
      document.getElementById('backButtonContainer').style.display = 'none';
    }
  

    function filterByTeacher(teacherEmail){
      document.getElementById('searchVideos').value = '';
      const filtered = allVideos.filter(v => v.teacher === teacherEmail);
      renderVideos(filtered);
      switchTab('videos');
      document.getElementById('backButtonContainer').style.display = 'block';
    }

    function showAllVideos(){
      document.getElementById('searchVideos').value = '';
      renderVideos(allVideos);
      document.getElementById('backButtonContainer').style.display = 'none';
    }

    function filterVideos() {
      const search = document.getElementById('searchVideos').value.toLowerCase();
      const category = document.getElementById('filterCategory').value;

      const filtered = allVideos.filter(v => {
        const titleMatch = v.title.toLowerCase().includes(search);
        const categoryMatch = category === '' || v.category === category;
        return titleMatch && categoryMatch;
      });

      renderVideos(filtered);
    }

    function openVideoModal(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      if (!video) return;

      currentVideoId = videoId;
      document.getElementById('videoTitle').textContent = video.title;
      document.getElementById('videoDescription').textContent = video.description;

      // Embed YouTube video
      const embedUrl = getYouTubeEmbedUrl(video.url);
      const playerDiv = document.getElementById('videoPlayer');
      
      // تنظيف الـ div أولاً
      playerDiv.innerHTML = '';
      
      if (!embedUrl || embedUrl === video.url) {
        // إذا لم نتمكن من استخراج معرف الفيديو
        playerDiv.innerHTML = `
          <div style="width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 10px; color: #666;">
            <i class="bi bi-exclamation-circle" style="font-size: 3rem; color: #dc3545; margin-bottom: 10px;"></i>
            <p>خطأ في تحميل الفيديو</p>
            <small>الرابط: ${video.url}</small>
            <a href="${video.url}" target="_blank" class="btn btn-sm btn-primary mt-3">
              <i class="bi bi-youtube"></i> شاهد على YouTube
            </a>
          </div>
        `;
      } else {
        playerDiv.innerHTML = `
          <iframe 
            width="100%" 
            height="100%" 
            src="${embedUrl}" 
            title="${video.title}"
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen="true"
            loading="lazy"
            style="border-radius: 10px;">
          </iframe>
        `;
      }

      const progress = studentProgress[videoId] || { percent: 0 };
      document.getElementById('progressSlider').value = progress.percent;
      document.getElementById('progressBar').style.width = progress.percent + '%';

      new bootstrap.Modal(document.getElementById('videoModal')).show();
    }

    async function markVideoComplete() {
      const progressPercent = document.getElementById('progressSlider').value;

      try {
        const res = await fetch(`${API_URL}/progress`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            student: studentEmail,
            videoId: currentVideoId,
            status: parseInt(progressPercent) >= 80 ? 'completed' : 'watching',
            progress: parseInt(progressPercent)
          })
        });

        if (res.ok) {
          const data = await res.json();
          studentProgress[currentVideoId] = data.progress;
          updateStats();
          loadAllVideos();
          Swal.fire('تم!', 'تم تحديث التقدم بنجاح', 'success');
        }
      } catch (err) {
        Swal.fire('خطأ', 'خطأ في حفظ التقدم', 'error');
      }
    }

    function updateStats() {
      const watched = Object.keys(studentProgress).length;
      const completed = Object.values(studentProgress).filter(p => p.status === 'completed').length;
      const avgProgress = watched > 0 
        ? Math.round(Object.values(studentProgress).reduce((sum, p) => sum + p.percent, 0) / watched)
        : 0;

      document.getElementById('videosWatched').textContent = watched;
      document.getElementById('completedVideos').textContent = completed;
      document.getElementById('totalProgress').textContent = avgProgress + '%';
      // امتحانات: يتم تحديثها بواسطة loadStudentGrades()
    }

    // جلب درجات الطالب وتحديث إحصائيات الامتحانات
    async function loadStudentGrades() {
      try {
        const res = await fetch(`${API_URL}/grades?student=${encodeURIComponent(studentEmail)}`);
        if (!res.ok) {
          document.getElementById('examsTaken').textContent = '0';
          document.getElementById('examsPassed').textContent = '0';
          return;
        }
        const grades = await res.json();
        const taken = grades.length;
        // اعتبر النجاح إذا كانت النسبة ≥50%
        const passed = grades.filter(g => {
          if (g.maxScore) {
            return (g.score / g.maxScore) * 100 >= 50;
          }
          return Number(g.score) >= 50;
        }).length;

        document.getElementById('examsTaken').textContent = taken;
        document.getElementById('examsPassed').textContent = passed;
      } catch (err) {
        console.error('خطأ في تحميل درجات الامتحانات:', err);
        document.getElementById('examsTaken').textContent = '0';
        document.getElementById('examsPassed').textContent = '0';
      }
    }

    function logout() {
      Swal.fire({
        title: 'هل تريد تسجيل الخروج؟',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'نعم',
        cancelButtonText: 'إلغاء'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.removeItem('userEmail');
          window.location.href = '../login/login.html';
        }
      });
    }
  </script>
  <!-- Modal لعرض PDF -->
  <div class="modal fade" id="pdfViewerModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">عرض ملف PDF</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" style="height:80vh;">
          <iframe id="pdfViewerFrame" style="width:100%;height:100%;border:0"></iframe>
        </div>
      </div>
    </div>
  </div>
</body>
