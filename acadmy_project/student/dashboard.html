<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
</head>
<body>
  <!-- الشريط العلوي -->
  <nav class="navbar navbar-expand-lg navbar-custom sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="bi bi-mortarboard"></i> لوحة الطالب</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <span class="nav-link" id="studentEmail"></span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i> خروج</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4">
    <!-- الإحصائيات -->
    <div class="row mb-4">
      <div class="col-md-3 mb-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <i class="bi bi-play-btn stat-icon"></i>
          <div>
            <div class="stat-number" id="videosWatched">0</div>
            <small class="text-muted">فيديوهات شاهدتها</small>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <i class="bi bi-check2-square stat-icon"></i>
          <div>
            <div class="stat-number" id="completedVideos">0</div>
            <small class="text-muted">فيديوهات مكتملة</small>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <i class="bi bi-percent stat-icon"></i>
          <div>
            <div class="stat-number" id="totalProgress">0%</div>
            <small class="text-muted">نسبة التقدم</small>
          </div>
        </div>
      </div>
      <div class="col-md-3 mb-3">
        <div class="stat-card d-flex align-items-center gap-3">
          <i class="bi bi-list-check stat-icon"></i>
          <div>
            <div class="stat-number" id="quizzes">0</div>
            <small class="text-muted">اختبارات</small>
          </div>
        </div>
      </div>
    </div>

    <!-- التصفية -->
    <div class="row mb-4">
      <div class="col-md-6">
        <input type="text" id="searchVideos" class="form-control" placeholder="ابحث عن فيديو...">
      </div>
      <div class="col-md-6">
        <div class="subject-filters text-start">
          <button class="btn btn-sm pill-prog" onclick="filterBySubject('')"><i class="bi bi-laptop icon-sm"></i> كل المواد</button>
          <button class="btn btn-sm pill-prog" onclick="filterBySubject('برمجة وذكاء اصطناعي')"><i class="bi bi-laptop icon-sm"></i> برمجة وذكاء اصطناعي</button>
          <button class="btn btn-sm pill-js" onclick="filterBySubject('جافا اسكربت')"><i class="bi bi-file-code icon-sm"></i> جافا اسكربت</button>
        </div>
      </div>
    </div>

    <!-- الفيديوهات -->
    <div class="row" id="videosList"></div>
  </div>

  <!-- Modal لعرض الفيديو -->
  <div class="modal fade" id="videoModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="videoTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="videoPlayer" style="width: 100%; height: 400px; background: #333; border-radius: 10px;"></div>
          <p id="videoDescription" class="mt-3"></p>
          <div class="mt-3">
            <label class="form-label">نسبة التقدم:</label>
            <div class="progress">
              <div id="progressBar" class="progress-bar progress-bar-animated" style="width: 0%"></div>
            </div>
            <input type="range" id="progressSlider" class="form-range mt-2" min="0" max="100" value="0">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إغلاق</button>
          <button type="button" class="btn btn-primary" id="markCompleteBtn">تم المشاهدة</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    let studentEmail = localStorage.getItem('userEmail') || 'student1@example.com';
    let allVideos = [];
    let studentProgress = {};
    let currentVideoId = null;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('studentEmail').textContent = studentEmail;
      loadStudentProgress();
      loadAllVideos();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('searchVideos').addEventListener('input', filterVideos);
      document.getElementById('filterCategory').addEventListener('change', filterVideos);
      document.getElementById('progressSlider').addEventListener('input', (e) => {
        document.getElementById('progressBar').style.width = e.target.value + '%';
      });
      document.getElementById('markCompleteBtn').addEventListener('click', markVideoComplete);
    }

    async function loadStudentProgress() {
      try {
        const res = await fetch(`${API_URL}/progress/${studentEmail}`);
        const progress = await res.json();
        progress.forEach(p => {
          studentProgress[p.videoId] = p;
        });
        updateStats();
      } catch (err) {
        console.error('خطأ في تحميل التقدم:', err);
      }
    }

    async function loadAllVideos() {
      try {
        const res = await fetch(`${API_URL}/videos`);
        allVideos = await res.json();
        renderVideos(allVideos);
      } catch (err) {
        console.error('خطأ في تحميل الفيديوهات:', err);
      }
    }

    function renderVideos(videos) {
      const container = document.getElementById('videosList');
      container.innerHTML = '';

      if (videos.length === 0) {
        container.innerHTML = '<div class="alert alert-info w-100">لا توجد فيديوهات متاحة حالياً</div>';
        return;
      }

      videos.forEach(video => {
        const progress = studentProgress[video.id] || { percent: 0, status: 'not-started' };
        const card = document.createElement('div');
        card.className = 'col-md-4 mb-4';
        card.innerHTML = `
          <div class="video-card" data-video-id="${video.id}" onclick="openVideoModal('${video.id}')">
            <div class="video-thumbnail">
              <i class="bi bi-play-circle" style="font-size: 3rem;"></i>
            </div>
            <div class="p-3">
              <h6 class="mb-2">${video.title}</h6>
              <p class="small text-muted mb-2">${video.description || 'بدون وصف'}</p>
              <div class="mb-2">
                ${getCatBadge(video.category)}
                <small class="text-muted ms-2">${video.teacher}</small>
              </div>
                <div class="progress" style="height: 5px;">
                <div class="progress-bar" style="width: ${progress.percent}%"></div>
              </div>
              <small class="text-muted d-block mt-2">${progress.percent}% مكتمل</small>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function getCatBadge(cat){
      if(!cat) return '';
      if(cat === 'برمجة وذكاء اصطناعي') return `<span class="badge-category pill-prog subject-label"><i class="bi bi-laptop icon-sm"></i> ${cat}</span>`;
      if(cat === 'جافا اسكربت') return `<span class="badge-category pill-js subject-label"><i class="bi bi-file-code icon-sm"></i> ${cat}</span>`;
      return `<span class="badge-category bg-light text-muted">${cat}</span>`;
    }

    function filterBySubject(subject){
      document.getElementById('searchVideos').value = '';
      if(!subject){ renderVideos(allVideos); return; }
      const filtered = allVideos.filter(v => v.category === subject);
      renderVideos(filtered);
    }

    function filterVideos() {
      const search = document.getElementById('searchVideos').value.toLowerCase();
      const category = document.getElementById('filterCategory').value;

      const filtered = allVideos.filter(v => {
        const titleMatch = v.title.toLowerCase().includes(search);
        const categoryMatch = category === '' || v.category === category;
        return titleMatch && categoryMatch;
      });

      renderVideos(filtered);
    }

    function openVideoModal(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      if (!video) return;

      currentVideoId = videoId;
      document.getElementById('videoTitle').textContent = video.title;
      document.getElementById('videoDescription').textContent = video.description;

      // محاكاة مشغل الفيديو
      document.getElementById('videoPlayer').innerHTML = `
        <div style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white;">
          <div>
            <i class="bi bi-play-circle" style="font-size: 4rem; margin-bottom: 10px;"></i>
            <p>فيديو YouTube / URL</p>
            <small>${video.url}</small>
          </div>
        </div>
      `;

      const progress = studentProgress[videoId] || { percent: 0 };
      document.getElementById('progressSlider').value = progress.percent;
      document.getElementById('progressBar').style.width = progress.percent + '%';

      new bootstrap.Modal(document.getElementById('videoModal')).show();
    }

    async function markVideoComplete() {
      const progressPercent = document.getElementById('progressSlider').value;

      try {
        const res = await fetch(`${API_URL}/progress`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            student: studentEmail,
            videoId: currentVideoId,
            status: parseInt(progressPercent) >= 80 ? 'completed' : 'watching',
            progress: parseInt(progressPercent)
          })
        });

        if (res.ok) {
          const data = await res.json();
          studentProgress[currentVideoId] = data.progress;
          updateStats();
          loadAllVideos();
          alert('تم تحديث التقدم بنجاح!');
        }
      } catch (err) {
        alert('خطأ في حفظ التقدم');
      }
    }

    function updateStats() {
      const watched = Object.keys(studentProgress).length;
      const completed = Object.values(studentProgress).filter(p => p.status === 'completed').length;
      const avgProgress = watched > 0 
        ? Math.round(Object.values(studentProgress).reduce((sum, p) => sum + p.percent, 0) / watched)
        : 0;

      document.getElementById('videosWatched').textContent = watched;
      document.getElementById('completedVideos').textContent = completed;
      document.getElementById('totalProgress').textContent = avgProgress + '%';
      document.getElementById('quizzes').textContent = '0'; // يمكن إضافة امتحانات لاحقاً
    }

    function logout() {
      if (confirm('هل تريد تسجيل الخروج؟')) {
        localStorage.removeItem('userEmail');
        window.location.href = '../login/login.html';
      }
    }
  </script>
</body>
</html>
