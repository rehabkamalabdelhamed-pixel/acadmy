<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة تحكم المدرس</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/theme.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <div class="row g-0 min-vh-100">
    <!-- الشريط الجانبي -->
    <div class="col-lg-2 sidebar">
      <div class="mb-4">
        <h2 class="mb-4"><i class="bi bi-mortarboard"></i> لوحة المدرس</h2>
        <div id="teacherInfo" class="text-muted small"></div>
      </div>
      <nav class="nav flex-column">
        <a class="nav-link text-white active" href="#" data-tab="dashboard">
          <i class="bi bi-house-door-fill me-2"></i> لوحة التحكم
        </a>
        <a class="nav-link text-white" href="#" data-tab="videos">
          <i class="bi bi-play-circle-fill me-2"></i> الفيديوهات
        </a>
        <a class="nav-link text-white" href="#" data-tab="addVideo">
          <i class="bi bi-plus-circle-fill me-2"></i> إضافة فيديو
        </a>
        <a class="nav-link text-white" href="#" data-tab="exams">
          <i class="bi bi-journal-text me-2"></i> الامتحانات
        </a>
        <a class="nav-link text-white" href="#" data-tab="pdfs">
          <i class="bi bi-file-earmark-pdf me-2"></i> ملفات PDF
        </a>
        <a class="nav-link text-white" href="#" data-tab="grades">
          <i class="bi bi-bar-chart me-2"></i> الدرجات
        </a>
        <hr class="border-secondary">
        <a class="nav-link text-white" href="#" onclick="logout()">
          <i class="bi bi-box-arrow-left me-2"></i> تسجيل الخروج
        </a>
      </nav>
      
    </div>

    <!-- المحتوى الرئيسي -->
    <div class="col-lg-10 main-content">
      <!-- لوحة التحكم -->
      <div id="dashboardTab" class="tab-content">
        <h2 class="mb-4">مرحباً بك في لوحة التحكم</h2>
        <div class="row">
          <div class="col-md-4 mb-3">
            <div class="stat-box">
              <div class="stat-number" id="videosCount">0</div>
              <p class="text-muted">الفيديوهات المضافة</p>
            </div>
          </div>
        </div>
      </div>

      <!-- الفيديوهات -->
      <div id="videosTab" class="tab-content d-none">
        <h2 class="mb-4">الفيديوهات الخاصة بي</h2>
        <div class="mb-3 subject-filters">
          <div class="btn-group" role="group" aria-label="subjects">
            <button class="btn btn-sm pill-prog" data-subject="" onclick="filterBySubject('')"><i class="bi bi-laptop icon-sm"></i> جميع المواد</button>
            <button class="btn btn-sm pill-prog" data-subject="برمجة وذكاء اصطناعي" onclick="filterBySubject('برمجة وذكاء اصطناعي')"><i class="bi bi-laptop icon-sm"></i> برمجة وذكاء اصطناعي</button>
            <button class="btn btn-sm pill-js" data-subject="جافا اسكربت" onclick="filterBySubject('جافا اسكربت')"><i class="bi bi-file-code icon-sm"></i> جافا اسكربت</button>
          </div>
        </div>
        <div class="input-group mb-3">
          <input type="text" id="searchVideos" class="form-control" placeholder="ابحث عن فيديو...">
        </div>
        <div id="videosList"></div>
      </div>

      <!-- إضافة فيديو -->
      <div id="addVideoTab" class="tab-content d-none">
        <h2 class="mb-4">إضافة فيديو جديد</h2>
        <div class="card">
          <div class="card-body">
            <form id="addVideoForm">
              <div class="mb-3">
                <label class="form-label">عنوان الفيديو</label>
                <input type="text" class="form-control" id="videoTitle" required>
              </div>
              <div class="mb-3">
                <label class="form-label">وصف الفيديو</label>
                <textarea class="form-control" id="videoDescription" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">رابط الفيديو (YouTube)</label>
                <input type="url" class="form-control" id="videoUrl" required placeholder="https://youtube.com/...">
              </div>
              <div class="mb-3">
                <label class="form-label">التصنيف</label>
                <select class="form-control" id="videoCategory" required>
                  <option value="">اختر تصنيف</option>
                  <option value="برمجة وذكاء اصطناعي">برمجة وذكاء اصطناعي</option>
                  <option value="جافا اسكربت">جافا اسكربت</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-upload me-2"></i> إضافة الفيديو
              </button>
            </form>
          </div>
        </div>
      </div>

      <!-- Modal لتعديل الفيديو -->
      <div class="modal fade" id="editVideoModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">تعديل الفيديو</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <form id="editVideoForm">
                <div class="mb-3">
                  <label class="form-label">عنوان الفيديو</label>
                  <input type="text" class="form-control" id="editVideoTitle" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">وصف الفيديو</label>
                  <textarea class="form-control" id="editVideoDescription" rows="3"></textarea>
                </div>
                <div class="mb-3">
                  <label class="form-label">رابط الفيديو (YouTube)</label>
                  <input type="url" class="form-control" id="editVideoUrl" required>
                </div>
                <div class="mb-3">
                  <label class="form-label">التصنيف</label>
                  <select class="form-control" id="editVideoCategory" required>
                    <option value="برمجة وذكاء اصطناعي">برمجة وذكاء اصطناعي</option>
                    <option value="جافا اسكربت">جافا اسكربت</option>
                  </select>
                </div>
              </form>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
              <button type="button" class="btn btn-primary" onclick="updateVideo()">حفظ التغييرات</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- ملفات PDF (ادارة) -->
      <div id="pdfsTab" class="tab-content d-none">
        <h2 class="mb-4">ملفات PDF</h2>
        <div class="row">
          <div class="col-md-6">
            <div class="card mb-3">
              <div class="card-body">
                <h5 class="card-title">إضافة PDF جديد</h5>
                <form id="addPdfForm">
                  <div class="mb-3">
                    <label class="form-label">العنوان</label>
                    <input id="pdfTitle" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">رابط الملف (URL)</label>
                    <input id="pdfUrl" type="url" class="form-control" placeholder="https://..." required>
                  </div>
                  <button class="btn btn-success w-100">إضافة PDF</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div id="pdfsList"></div>
          </div>
        </div>
      </div>

      <!-- الامتحانات (ادارة) -->
      <div id="examsTab" class="tab-content d-none">
        <h2 class="mb-4">الامتحانات</h2>
        <div class="row">
          <div class="col-md-6">
            <div class="card mb-3">
              <div class="card-body">
                <h5 class="card-title">اضافة امتحان</h5>
                <form id="addExamForm">
                  <div class="mb-3">
                    <label class="form-label">عنوان الامتحان</label>
                    <input id="examTitle" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">تاريخ الامتحان</label>
                    <input id="examDate" type="date" class="form-control" required>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">اختر PDF (اختياري)</label>
                    <select id="examPdfSelect" class="form-control">
                      <option value="">بدون ملف</option>
                    </select>
                  </div>
                  <button class="btn btn-success w-100">إضافة الامتحان</button>
                </form>
              </div>
            </div>
          </div>
          <div class="col-md-6">
            <div id="examsList"></div>
          </div>
        </div>
      </div>

      <!-- الدرجات (إدارة ومراجعة) -->
      <div id="gradesTab" class="tab-content d-none">
        <h2 class="mb-4">إدارة الدرجات</h2>
        <div class="mb-3">
          <label class="form-label">اختر امتحان:</label>
          <select id="gradesExamSelect" class="form-control" onchange="loadGradesForExam()">
            <option value="">-- اختر امتحان --</option>
          </select>
        </div>
        <div id="gradesContainer" class="table-responsive">
          <div class="alert alert-info">اختر امتحان لعرض الدرجات</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const API_URL = 'http://localhost:3000';
    let teacherEmail = localStorage.getItem('userEmail') || 'warda12345@gmail.com';
    let currentEditVideoId = null;
    let allVideos = [];

    // تهيئة
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('teacherInfo').textContent = teacherEmail;
      loadTeacherStats();
      loadTeacherVideos();
      loadPdfsAdmin();
      loadExamsAdmin();
      loadGradesExams();
      setupEventListeners();
    });

    function setupEventListeners() {
      // التنقل بين الأقسام
      document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', (e) => {
          if (link.dataset.tab) {
            e.preventDefault();
            switchTab(link.dataset.tab);
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            link.classList.add('active');
          }
        });
      });

      // إضافة فيديو
      document.getElementById('addVideoForm').addEventListener('submit', addVideo);

      // بحث الفيديوهات
      document.getElementById('searchVideos').addEventListener('input', filterVideos);
      // pdf/exam forms
      const addPdfForm = document.getElementById('addPdfForm');
      if (addPdfForm) addPdfForm.addEventListener('submit', addPdf);
      const addExamForm = document.getElementById('addExamForm');
      if (addExamForm) addExamForm.addEventListener('submit', addExam);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
      document.getElementById(tab + 'Tab').classList.remove('d-none');
    }

    // ------------------ PDFs & Exams (teacher) ------------------
    async function loadPdfsAdmin() {
      try {
        const res = await fetch(`${API_URL}/pdfs`);
        const pdfs = await res.json();
        renderPdfs(pdfs);
        // populate exam select
        const sel = document.getElementById('examPdfSelect');
        if (sel) {
          sel.innerHTML = '<option value="">بدون ملف</option>' + pdfs.map(p=>`<option value="${p.id}">${p.title}</option>`).join('');
        }
      } catch (err) {
        console.error('خطأ في تحميل PDF:', err);
      }
    }

    function renderPdfs(pdfs) {
      const container = document.getElementById('pdfsList');
      if (!container) return;
      if (pdfs.length === 0) {
        container.innerHTML = '<div class="alert alert-info">لا توجد ملفات PDF</div>';
        return;
      }
      container.innerHTML = pdfs.map(p=>`
        <div class="card mb-2">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="mb-1">${p.title}</h6>
              <small class="text-muted">${p.url}</small>
            </div>
            <div class="btn-group">
              <a class="btn btn-sm btn-outline-primary" href="${p.url}" target="_blank">عرض</a>
              <button class="btn btn-sm btn-outline-danger" onclick="deletePdf('${p.id}')">حذف</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function addPdf(e) {
      e.preventDefault();
      const title = document.getElementById('pdfTitle').value.trim();
      const url = document.getElementById('pdfUrl').value.trim();
      if (!title || !url) return Swal.fire('خطأ','يرجى ملء الحقول','error');
      try {
        const res = await fetch(`${API_URL}/pdfs`, {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ title, url, teacher: teacherEmail })
        });
        if (res.ok) {
          document.getElementById('addPdfForm').reset();
          Swal.fire('تم','تم إضافة PDF','success');
          loadPdfsAdmin();
        } else {
          const err = await res.json(); Swal.fire('خطأ', err.message, 'error');
        }
      } catch (err) { Swal.fire('خطأ','خطأ في الاتصال','error'); }
    }

    async function deletePdf(id) {
      const ok = await Swal.fire({ title:'حذف ملف؟', showCancelButton:true, confirmButtonText:'نعم', cancelButtonText:'إلغاء' });
      if (!ok.isConfirmed) return;
      try {
        const res = await fetch(`${API_URL}/pdfs/${id}`, { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ teacher: teacherEmail }) });
        if (res.ok) { Swal.fire('تم','تم الحذف','success'); loadPdfsAdmin(); loadExamsAdmin(); }
        else { const err = await res.json(); Swal.fire('خطأ', err.message, 'error'); }
      } catch (err) { Swal.fire('خطأ','خطأ في الاتصال','error'); }
    }

    async function loadExamsAdmin() {
      try {
        const res = await fetch(`${API_URL}/exams`);
        const exams = await res.json();
        renderExams(exams);
      } catch (err) { console.error('خطأ في تحميل الامتحانات', err); }
    }

    function renderExams(exams) {
      const container = document.getElementById('examsList');
      if (!container) return;
      if (exams.length === 0) return container.innerHTML = '<div class="alert alert-info">لا توجد امتحانات</div>';
      container.innerHTML = exams.map(e=>`
        <div class="card mb-2">
          <div class="card-body d-flex justify-content-between align-items-center">
            <div>
              <h6 class="mb-1">${e.title}</h6>
              <small class="text-muted">تاريخ: ${e.date} ${e.pdf ? ' - ملف مرتبط' : ''}</small>
            </div>
            <div class="btn-group">
              ${e.pdf ? `<button class="btn btn-sm btn-outline-primary" onclick="openPdfById('${e.pdf}')">عرض الملف</button>` : ''}
              <button class="btn btn-sm btn-outline-danger" onclick="deleteExam('${e.id}')">حذف</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function getPdfUrlById(id) {
      // lookup currently loaded pdfs via a fetch (sync not possible), so open via endpoint
      return `${API_URL}/pdfs/${id}`;
    }

    async function openPdfById(id) {
      try {
        const res = await fetch(`${API_URL}/pdfs/${id}`);
        if (!res.ok) return Swal.fire('خطأ','ملف غير موجود','error');
        const pdf = await res.json();
        if (pdf && pdf.url) window.open(pdf.url, '_blank');
        else Swal.fire('خطأ','لا يوجد رابط للملف','error');
      } catch (err) { Swal.fire('خطأ','خطأ في الاتصال','error'); }
    }

    async function addExam(e) {
      e.preventDefault();
      const title = document.getElementById('examTitle').value.trim();
      const date = document.getElementById('examDate').value;
      const pdf = document.getElementById('examPdfSelect').value || null;
      if (!title || !date) return Swal.fire('خطأ','يرجى ملء الحقول','error');
      try {
        const res = await fetch(`${API_URL}/exams`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ title, date, pdf, teacher: teacherEmail }) });
        if (res.ok) { document.getElementById('addExamForm').reset(); Swal.fire('تم','تم إضافة الامتحان','success'); loadExamsAdmin(); }
        else { const err = await res.json(); Swal.fire('خطأ', err.message, 'error'); }
      } catch (err) { Swal.fire('خطأ','خطأ في الاتصال','error'); }
    }

    async function deleteExam(id) {
      const ok = await Swal.fire({ title:'حذف امتحان؟', showCancelButton:true, confirmButtonText:'نعم', cancelButtonText:'إلغاء' });
      if (!ok.isConfirmed) return;
      try {
        const res = await fetch(`${API_URL}/exams/${id}`, { method:'DELETE', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ teacher: teacherEmail }) });
        if (res.ok) { Swal.fire('تم','تم الحذف','success'); loadExamsAdmin(); } else { const err = await res.json(); Swal.fire('خطأ', err.message, 'error'); }
      } catch (err) { Swal.fire('خطأ','خطأ في الاتصال','error'); }
    }

    // ---------------------- Grades Management ----------------------
    async function loadGradesExams() {
      try {
        const res = await fetch(`${API_URL}/exams`);
        const exams = await res.json();
        const sel = document.getElementById('gradesExamSelect');
        if (sel) {
          sel.innerHTML = '<option value="">-- اختر امتحان --</option>' + exams.map(e=>`<option value="${e.id}">${e.title}</option>`).join('');
        }
      } catch (err) { console.error('خطأ في تحميل الامتحانات', err); }
    }

    async function loadGradesForExam() {
      const examId = document.getElementById('gradesExamSelect').value;
      if (!examId) {
        document.getElementById('gradesContainer').innerHTML = '<div class="alert alert-info">اختر امتحان لعرض الدرجات</div>';
        return;
      }
      try {
        const res = await fetch(`${API_URL}/exams/${examId}/grades`);
        const grades = res.ok ? await res.json() : [];
        if (grades.length === 0) {
          document.getElementById('gradesContainer').innerHTML = '<div class="alert alert-secondary">لا توجد درجات لهذا الامتحان</div>';
          return;
        }
        const html = `
          <div style="border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <table class="table table-hover mb-0">
              <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                <tr>
                  <th style="padding: 15px; font-weight: 600;">اسم الطالب</th>
                  <th style="padding: 15px; font-weight: 600;">البريد الإلكتروني</th>
                  <th style="padding: 15px; font-weight: 600; text-align: center;">النقاط</th>
                  <th style="padding: 15px; font-weight: 600;">التاريخ</th>
                  <th style="padding: 15px; font-weight: 600; text-align: center;">النسبة</th>
                </tr>
              </thead>
              <tbody>
                ${grades.map((g, idx) => {
                  const percentage = g.maxScore ? Math.round((g.score / g.maxScore) * 100) : 0;
                  const badgeColor = percentage >= 80 ? '#28a745' : percentage >= 60 ? '#ffc107' : '#dc3545';
                  return `
                    <tr style="border-bottom: 1px solid #eee;">
                      <td style="padding: 12px 15px; vertical-align: middle;">
                        <strong>${g.studentName || '-'}</strong>
                      </td>
                      <td style="padding: 12px 15px; vertical-align: middle; direction: ltr; text-align: left;">
                        <small class="text-muted">${g.student}</small>
                      </td>
                      <td style="padding: 12px 15px; vertical-align: middle; text-align: center;">
                        <span style="background: #f0f0f0; padding: 6px 12px; border-radius: 6px; font-weight: 600;">
                          ${g.score}${g.maxScore ? ' / ' + g.maxScore : ''}
                        </span>
                      </td>
                      <td style="padding: 12px 15px; vertical-align: middle; font-size: 0.9em;">
                        ${new Date(g.createdAt).toLocaleDateString('ar-EG')}
                      </td>
                      <td style="padding: 12px 15px; vertical-align: middle; text-align: center;">
                        <span style="background: ${badgeColor}; color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; font-weight: 600;">
                          ${percentage}%
                        </span>
                      </td>
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          </div>
        `;
        document.getElementById('gradesContainer').innerHTML = html;
      } catch (err) { console.error('خطأ في تحميل الدرجات', err); }
    }

    async function loadTeacherStats() {
      try {
        const res = await fetch(`${API_URL}/admin/stats?email=${teacherEmail}`);
        const stats = await res.json();
        document.getElementById('videosCount').textContent = stats.myVideos || 0;
      } catch (err) {
        console.error('خطأ في تحميل الإحصائيات:', err);
      }
    }

    // ---------------------- PDF tabs (sidebar) ----------------------
    (function initPdfTabs(){
      const pdfTabs = document.getElementById('pdfTabs');
      const input = document.getElementById('pdfFileInput');
      const addBtn = document.getElementById('addPdfBtn');
      if (!pdfTabs || !input || !addBtn) return;

      // modal for viewing
      if (!document.getElementById('pdfViewerModal')) {
        const modal = document.createElement('div');
        modal.id = 'pdfViewerModal';
        Object.assign(modal.style, {position:'fixed',top:0,left:0,width:'100%',height:'100%',background:'rgba(0,0,0,0.7)',display:'none',alignItems:'center',justifyContent:'center',zIndex:9999});
        modal.innerHTML = `<div style="width:90%;height:90%;background:#fff;position:relative;border-radius:6px;overflow:hidden">
          <button id="pdfModalClose" style="position:absolute;left:10px;top:10px;z-index:2" class="btn btn-sm btn-danger">إغلاق</button>
          <iframe id="pdfViewerFrame" style="width:100%;height:100%;border:0"></iframe>
        </div>`;
        document.body.appendChild(modal);
        document.getElementById('pdfModalClose').addEventListener('click', () => {
          document.getElementById('pdfViewerFrame').src = '';
          modal.style.display = 'none';
        });
      }

      addBtn.addEventListener('click', () => input.click());

      input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const wrapper = document.createElement('div');
        wrapper.style.display = 'inline-flex';
        wrapper.style.alignItems = 'center';
        wrapper.style.marginRight = '6px';

        const btn = document.createElement('div');
        btn.className = 'btn btn-sm btn-light d-inline-flex align-items-center';
        btn.style.gap = '6px';
        btn.innerHTML = `<span style="max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${file.name}</span>`;
        btn.addEventListener('click', () => {
          document.getElementById('pdfViewerFrame').src = url;
          document.getElementById('pdfViewerModal').style.display = 'flex';
        });

        const remove = document.createElement('button');
        remove.className = 'btn btn-sm btn-outline-danger';
        remove.style.marginInlineStart = '6px';
        remove.textContent = '✕';
        remove.addEventListener('click', (ev) => {
          ev.stopPropagation();
          URL.revokeObjectURL(url);
          pdfTabs.removeChild(wrapper);
        });

        wrapper.appendChild(btn);
        wrapper.appendChild(remove);
        pdfTabs.appendChild(wrapper);
        input.value = '';
      });
    })();

    async function loadTeacherVideos() {
      try {
        const res = await fetch(`${API_URL}/videos?teacher=${teacherEmail}`);
        allVideos = await res.json();
        renderVideos(allVideos);
      } catch (err) {
        console.error('خطأ في تحميل الفيديوهات:', err);
      }
    }

    function renderVideos(videos) {
      const list = document.getElementById('videosList');
      list.innerHTML = '';
      
      if (videos.length === 0) {
        list.innerHTML = '<div class="alert alert-info text-center py-5"><i class="bi bi-inbox" style="font-size: 2.5rem; margin-bottom: 10px;"></i><p class="mt-3">لا توجد فيديوهات حتى الآن</p><small class="text-muted">ابدأ بإضافة فيديوهاتك الأولى</small></div>';
        return;
      }

      videos.forEach(video => {
        const item = document.createElement('div');
        item.className = 'card video-item mb-3';
        item.innerHTML = `
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div class="flex-grow-1">
                <h5 class="card-title"><i class="bi bi-play-circle me-2"></i>${video.title}</h5>
                <p class="card-text small text-muted">${video.description || 'بدون وصف'}</p>
                <small>
                  ${getCatBadge(video.category)}
                  <span class="text-muted ms-2"><i class="bi bi-calendar-event me-1"></i>${new Date(video.createdAt).toLocaleDateString('ar-EG')}</span>
                </small>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-outline-warning btn-sm" onclick="openEditModal('${video.id}')" title="تعديل">
                  <i class="bi bi-pencil-square"></i>
                </button>
                <button class="btn btn-outline-danger btn-sm" onclick="deleteVideo('${video.id}')" title="حذف">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          </div>
        `;
        list.appendChild(item);
      });
    }

    function getCatBadge(cat){
      if(!cat) return '';
      if(cat === 'برمجة وذكاء اصطناعي') return `<span class="badge-category pill-prog subject-label"><i class="bi bi-laptop icon-sm"></i> ${cat}</span>`;
      if(cat === 'جافا اسكربت') return `<span class="badge-category pill-js subject-label"><i class="bi bi-file-code icon-sm"></i> ${cat}</span>`;
      return `<span class="badge-category bg-light text-muted">${cat}</span>`;
    }

    function filterBySubject(subject){
      document.getElementById('searchVideos').value = '';
      const items = document.querySelectorAll('.video-item');
      items.forEach(it => it.style.display = '');
      if(!subject) return loadTeacherVideos();
      // simple client-side filter
      const filtered = allVideos.filter(v => v.category === subject);
      renderVideos(filtered);
    }

    function filterVideos() {
      const search = document.getElementById('searchVideos').value.toLowerCase();
      document.querySelectorAll('.video-item').forEach(item => {
        const title = item.textContent.toLowerCase();
        item.style.display = title.includes(search) ? '' : 'none';
      });
    }

    async function addVideo(e) {
      e.preventDefault();
      
      const video = {
        title: document.getElementById('videoTitle').value,
        description: document.getElementById('videoDescription').value,
        url: document.getElementById('videoUrl').value,
        category: document.getElementById('videoCategory').value,
        teacher: teacherEmail
      };

      try {
        const res = await fetch(`${API_URL}/videos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(video)
        });

        if (res.ok) {
          document.getElementById('addVideoForm').reset();
          Swal.fire('تم!', 'تم إضافة الفيديو بنجاح', 'success');
          loadTeacherStats();
          loadTeacherVideos();
          switchTab('videos');
        } else {
          const error = await res.json();
          Swal.fire('خطأ', error.message, 'error');
        }
      } catch (err) {
        Swal.fire('خطأ', 'خطأ في الاتصال بالخادم', 'error');
      }
    }

    async function deleteVideo(videoId) {
      const result = await Swal.fire({
        title: 'هل تريد حذف هذا الفيديو؟',
        text: 'لا يمكن التراجع عن هذا الإجراء',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#d33',
        cancelButtonColor: '#3085d6',
        confirmButtonText: 'نعم، احذف',
        cancelButtonText: 'إلغاء'
      });

      if (!result.isConfirmed) return;

      try {
        const res = await fetch(`${API_URL}/videos/${videoId}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ teacher: teacherEmail })
        });

        if (res.ok) {
          Swal.fire('تم!', 'تم حذف الفيديو بنجاح', 'success');
          loadTeacherStats();
          loadTeacherVideos();
        } else {
          const error = await res.json();
          Swal.fire('خطأ', error.message, 'error');
        }
      } catch (err) {
        Swal.fire('خطأ', 'خطأ في الاتصال بالخادم', 'error');
      }
    }

    function openEditModal(videoId) {
      const video = allVideos.find(v => v.id === videoId);
      if (!video) return;

      currentEditVideoId = videoId;
      document.getElementById('editVideoTitle').value = video.title;
      document.getElementById('editVideoDescription').value = video.description;
      document.getElementById('editVideoUrl').value = video.url;
      document.getElementById('editVideoCategory').value = video.category;

      new bootstrap.Modal(document.getElementById('editVideoModal')).show();
    }

    async function updateVideo() {
      const title = document.getElementById('editVideoTitle').value;
      const description = document.getElementById('editVideoDescription').value;
      const url = document.getElementById('editVideoUrl').value;
      const category = document.getElementById('editVideoCategory').value;

      if (!title || !url || !category) {
        Swal.fire('خطأ', 'يرجى ملء جميع الحقول المطلوبة', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/videos/${currentEditVideoId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, url, category, teacher: teacherEmail })
        });

        if (res.ok) {
          bootstrap.Modal.getInstance(document.getElementById('editVideoModal')).hide();
          Swal.fire('تم!', 'تم تحديث الفيديو بنجاح', 'success');
          loadTeacherStats();
          loadTeacherVideos();
        } else {
          const error = await res.json();
          Swal.fire('خطأ', error.message, 'error');
        }
      } catch (err) {
        Swal.fire('خطأ', 'خطأ في الاتصال بالخادم', 'error');
      }
    }

    function logout() {
      Swal.fire({
        title: 'هل تريد تسجيل الخروج؟',
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#3085d6',
        cancelButtonColor: '#d33',
        confirmButtonText: 'نعم',
        cancelButtonText: 'إلغاء'
      }).then((result) => {
        if (result.isConfirmed) {
          localStorage.removeItem('userEmail');
          window.location.href = '../login/login.html';
        }
      });
    }
  </script>
</body>
</html>
